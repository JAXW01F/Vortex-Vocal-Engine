<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vortex Vocal Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --bg:       #050d14;
    --panel:    #0a1a26;
    --border:   #0e2d42;
    --cyan:     #00d4ff;
    --green:    #39ff14;
    --orange:   #ff6b35;
    --red:      #ff0044;
    --text:     #c8e8f5;
    --dim:      #3a6070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 18px 20px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  header p {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-top: 2px;
  }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    margin-right: 6px;
    vertical-align: middle;
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Main grid ── */
  main {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Big activate button ── */
  #activateBtn {
    width: 100%;
    padding: 20px;
    background: transparent;
    border: 2px solid var(--cyan);
    border-radius: 6px;
    color: var(--cyan);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.03);
  }
  #activateBtn:active { transform: scale(0.97); }
  #activateBtn.live {
    background: rgba(0,212,255,0.08);
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 24px rgba(57,255,20,0.2), inset 0 0 20px rgba(57,255,20,0.05);
  }

  /* ── Visualiser ── */
  #vizCanvas {
    width: 100%;
    height: 80px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    display: block;
  }

  /* ── Meters row ── */
  .meters-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .meter-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .meter-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--dim);
  }

  .meter-value {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--cyan);
  }

  .meter-value.warn  { color: var(--orange); }
  .meter-value.alert { color: var(--red); animation: pulse 0.5s infinite; }

  .bar-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.05s linear;
  }
  .bar-fill.cyan   { background: var(--cyan); }
  .bar-fill.green  { background: var(--green); }
  .bar-fill.anom   { background: var(--orange); }

  /* ── Knobs section ── */
  .section-title {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .knobs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .knob-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .knob-label {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--dim);
  }

  .knob-val {
    font-size: 0.7rem;
    color: var(--cyan);
  }

  /* SVG knob */
  .knob-svg { cursor: pointer; touch-action: none; }

  /* ── Anomaly log ── */
  .anom-log {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    height: 90px;
    overflow-y: auto;
    font-size: 0.6rem;
    line-height: 1.8;
  }

  .anom-log::-webkit-scrollbar { width: 3px; }
  .anom-log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry { color: var(--dim); }
  .log-entry.spike { color: var(--orange); }
  .log-entry.ess   { color: var(--cyan); }
  .log-entry.pitch { color: var(--green); }

  /* ── Toggle row ── */
  .toggle-row {
    display: flex;
    gap: 10px;
  }

  .tog-btn {
    flex: 1;
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tog-btn.on {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,212,255,0.07);
  }

  /* ── Footer ── */
  footer {
    padding: 12px;
    font-size: 0.5rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* scan line overlay */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events:none;
    z-index:999;
  }
</style>
</head>
<body>

<header>
  <h1>VORTEX VOCAL</h1>
  <p><span class="status-dot" id="dot"></span><span id="statusTxt">TAP TO ACTIVATE MIC</span></p>
</header>

<main>

  <button id="activateBtn" onclick="toggleAudio()">▶ ACTIVATE ENGINE</button>

  <canvas id="vizCanvas"></canvas>

  <!-- Meters -->
  <div class="meters-row">
    <div class="meter-box">
      <div class="meter-label">INPUT</div>
      <div class="meter-value" id="mIn">-∞</div>
      <div class="bar-track"><div class="bar-fill cyan" id="bIn"></div></div>
    </div>
    <div class="meter-box">
      <div class="meter-label">ANOMALY</div>
      <div class="meter-value" id="mAnom">0%</div>
      <div class="bar-track"><div class="bar-fill anom" id="bAnom"></div></div>
    </div>
    <div class="meter-box">
      <div class="meter-label">PITCH</div>
      <div class="meter-value" id="mPitch">-- Hz</div>
      <div class="bar-track"><div class="bar-fill green" id="bPitch"></div></div>
    </div>
  </div>

  <!-- Knobs -->
  <div class="section-title">PROCESSING CONTROLS</div>
  <div class="knobs-grid" id="knobsGrid"></div>

  <!-- Feature toggles -->
  <div class="toggle-row">
    <div class="tog-btn on" id="togSmooth" onclick="toggleFeature('smooth')">⟳ SMOOTH</div>
    <div class="tog-btn on" id="togDeess"  onclick="toggleFeature('deess')">◈ DE-ESS</div>
    <div class="tog-btn"   id="togPitch"   onclick="toggleFeature('pitch')">♪ PITCH</div>
  </div>

  <!-- Anomaly log -->
  <div class="section-title">EVENT LOG</div>
  <div class="anom-log" id="anomLog">
    <div class="log-entry">// waiting for audio input...</div>
  </div>

</main>

<footer>VORTEX VOCAL ENGINE · PHI-EMA DSP · WEB AUDIO API</footer>

<script>
// ================================================================
// VORTEX DSP — JavaScript port of your Python/C++ algorithms
// ================================================================

// ── Phi-EMA ──────────────────────────────────────────────────────
class PhiEMA {
  constructor() { this.PHI = 1.618033988; this.alpha = 1/this.PHI; this.ema = 0; }
  reset(v=0) { this.ema = v; }
  process(x) { this.ema = this.alpha*x + (1-this.alpha)*this.ema; return this.ema; }
}

// ── Circular window ───────────────────────────────────────────────
class CircularWindow {
  constructor(size) { this.size=size; this.buf=new Float32Array(size); this.head=0; this.count=0; }
  push(v) { this.buf[this.head]=v; this.head=(this.head+1)%this.size; if(this.count<this.size) this.count++; }
  get(i) { let oldest=this.count<this.size?0:this.head; return this.buf[(oldest+i)%this.size]; }
  mean() { if(!this.count)return 0; let s=0; for(let i=0;i<this.count;i++)s+=this.get(i); return s/this.count; }
  variance() {
    if(this.count<2)return 0;
    let m=this.mean(),s=0;
    for(let i=0;i<this.count;i++){let d=this.get(i)-m;s+=d*d;}
    return s/this.count;
  }
  stddev() { return Math.sqrt(this.variance()); }
}

// ── Anomaly detector ─────────────────────────────────────────────
class AnomalyDetector {
  constructor(size=32) { this.win=new CircularWindow(size); }
  process(x) {
    this.win.push(x);
    if(this.win.count<3) return {score:0,z:0,isAnomaly:false,dir:0};
    let m=this.win.mean(), std=Math.max(this.win.stddev(),1e-9);
    let z=(x-m)/std;
    let score=Math.tanh(Math.abs(z)/2);
    let dir = z>1.5?1:z<-1.5?-1:0;
    return {score, z, isAnomaly:score>0.7, dir};
  }
}

// ── Envelope follower ────────────────────────────────────────────
class EnvelopeFollower {
  constructor(sr) {
    this.env=0;
    this.atk = Math.exp(-1/(sr*0.005));
    this.rel = Math.exp(-1/(sr*0.1));
  }
  process(x) {
    let rect=Math.abs(x);
    let c=rect>this.env?this.atk:this.rel;
    this.env=c*this.env+(1-c)*rect;
    return this.env;
  }
}

// ── Simple pitch detector (autocorrelation) ──────────────────────
class PitchTracker {
  constructor(sr) {
    this.sr=sr; this.FRAME=2048;
    this.frame=new Float32Array(this.FRAME);
    this.pos=0; this.pitch=0;
    this.smoother=new PhiEMA();
  }
  process(x) {
    this.frame[this.pos++]=x;
    if(this.pos>=this.FRAME) {
      this.pos=0;
      let hz=this._detect();
      if(hz>60&&hz<800) this.pitch=this.smoother.process(hz);
    }
    return this.pitch;
  }
  _detect() {
    let minLag=Math.ceil(this.sr/800), maxLag=Math.floor(this.sr/60);
    let best=-Infinity, lag=0;
    for(let t=minLag;t<=maxLag&&t<this.FRAME/2;t++) {
      let c=0;
      for(let n=0;n<this.FRAME/2;n++) c+=this.frame[n]*this.frame[n+t];
      if(c>best){best=c;lag=t;}
    }
    return lag>0?this.sr/lag:0;
  }
}

// ================================================================
// STATE
// ================================================================
let audioCtx=null, stream=null, processor=null, analyser=null;
let isRunning=false;
let features={smooth:true, deess:true, pitch:false};

// DSP objects (created when audio starts)
let dsp={};

// Params (0-1)
let params={
  inputGain:  0.8,
  smoothing:  0.5,
  anomaly:    0.6,
  deEsser:    0.5,
  outputGain: 0.8,
  mix:        1.0,
};

// Running meters
let meters={inDb:-60, anom:0, pitchHz:0, deGain:1};

// ================================================================
// KNOBS — SVG rotary, touch/drag
// ================================================================
const KNOB_DEFS = [
  {id:'inputGain',  label:'IN GAIN',  min:0, max:2,   step:0.01, fmt:v=>(20*Math.log10(Math.max(v,1e-4))).toFixed(1)+'dB'},
  {id:'smoothing',  label:'SMOOTH',   min:0, max:1,   step:0.01, fmt:v=>Math.round(v*100)+'%'},
  {id:'anomaly',    label:'ANOMALY',  min:0, max:1,   step:0.01, fmt:v=>Math.round(v*100)+'%'},
  {id:'deEsser',    label:'DE-ESS',   min:0, max:1,   step:0.01, fmt:v=>Math.round(v*100)+'%'},
  {id:'outputGain', label:'OUT GAIN', min:0, max:2,   step:0.01, fmt:v=>(20*Math.log10(Math.max(v,1e-4))).toFixed(1)+'dB'},
  {id:'mix',        label:'MIX',      min:0, max:1,   step:0.01, fmt:v=>Math.round(v*100)+'%'},
];

function buildKnobs() {
  const grid=document.getElementById('knobsGrid');
  KNOB_DEFS.forEach(def=>{
    const wrap=document.createElement('div');
    wrap.className='knob-wrap';

    const SIZE=72, CX=36, CY=36, R=24;
    const startA=-2.35, endA=2.35;

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',SIZE); svg.setAttribute('height',SIZE);
    svg.classList.add('knob-svg');
    svg.setAttribute('viewBox',`0 0 ${SIZE} ${SIZE}`);

    const bgArc=document.createElementNS('http://www.w3.org/2000/svg','path');
    bgArc.setAttribute('fill','none'); bgArc.setAttribute('stroke','#0e2d42'); bgArc.setAttribute('stroke-width','4');
    bgArc.setAttribute('stroke-linecap','round');

    const fgArc=document.createElementNS('http://www.w3.org/2000/svg','path');
    fgArc.setAttribute('fill','none'); fgArc.setAttribute('stroke','#00d4ff'); fgArc.setAttribute('stroke-width','4');
    fgArc.setAttribute('stroke-linecap','round');

    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('r','3'); dot.setAttribute('fill','#00d4ff');

    svg.append(bgArc, fgArc, dot);

    const label=document.createElement('div');
    label.className='knob-label'; label.textContent=def.label;

    const val=document.createElement('div');
    val.className='knob-val'; val.id='kv_'+def.id;

    wrap.append(svg, label, val);
    grid.appendChild(wrap);

    function describeArc(a1, a2) {
      let x1=CX+R*Math.sin(a1), y1=CY-R*Math.cos(a1);
      let x2=CX+R*Math.sin(a2), y2=CY-R*Math.cos(a2);
      let large=Math.abs(a2-a1)>Math.PI?1:0;
      return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    }

    function updateKnob() {
      let norm=(params[def.id]-def.min)/(def.max-def.min);
      norm=Math.max(0,Math.min(1,norm));
      let angle=startA+(endA-startA)*norm;
      bgArc.setAttribute('d', describeArc(startA,endA));
      fgArc.setAttribute('d', describeArc(startA,angle));
      let dx=CX+(R+8)*Math.sin(angle), dy=CY-(R+8)*Math.cos(angle);
      dot.setAttribute('cx',dx); dot.setAttribute('cy',dy);
      val.textContent=def.fmt(params[def.id]);
    }

    updateKnob();

    // Touch drag
    let startY, startVal;
    function onStart(e) {
      e.preventDefault();
      startY=(e.touches?e.touches[0].clientY:e.clientY);
      startVal=params[def.id];
      window.addEventListener('mousemove',onMove);
      window.addEventListener('touchmove',onMove,{passive:false});
      window.addEventListener('mouseup',onEnd);
      window.addEventListener('touchend',onEnd);
    }
    function onMove(e) {
      e.preventDefault();
      let y=e.touches?e.touches[0].clientY:e.clientY;
      let delta=(startY-y)/120; // 120px = full range
      params[def.id]=Math.max(def.min,Math.min(def.max, startVal+delta*(def.max-def.min)));
      updateKnob();
    }
    function onEnd() {
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('touchmove',onMove);
      window.removeEventListener('mouseup',onEnd);
      window.removeEventListener('touchend',onEnd);
    }
    svg.addEventListener('mousedown',onStart);
    svg.addEventListener('touchstart',onStart,{passive:false});
  });
}

buildKnobs();

// ================================================================
// AUDIO ENGINE
// ================================================================
async function toggleAudio() {
  if(isRunning) { stopAudio(); return; }
  try {
    stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') await audioCtx.resume();

    const SR=audioCtx.sampleRate;
    dsp.env   = new EnvelopeFollower(SR);
    dsp.anom  = new AnomalyDetector(48);
    dsp.hfAnom= new AnomalyDetector(32);
    dsp.ema   = new PhiEMA();
    dsp.pitch = new PitchTracker(SR);
    dsp.gainSmooth=0; // last applied gain

    const source=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;

    // ScriptProcessor (supported on iOS Safari without AudioWorklet flag)
    processor=audioCtx.createScriptProcessor(512,1,1);
    processor.onaudioprocess=processAudio;

    source.connect(analyser);
    analyser.connect(processor);
    processor.connect(audioCtx.destination);

    isRunning=true;
    document.getElementById('activateBtn').textContent='⏹ STOP ENGINE';
    document.getElementById('activateBtn').classList.add('live');
    document.getElementById('dot').classList.add('live');
    document.getElementById('statusTxt').textContent='LIVE · PROCESSING';

    drawViz();
  } catch(e) {
    log('⚠ MIC ERROR: '+e.message,'spike');
    alert('Could not access microphone. Please allow mic permission and try again.');
  }
}

function stopAudio() {
  if(processor){processor.disconnect();processor=null;}
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx){audioCtx.close();audioCtx=null;}
  isRunning=false;
  document.getElementById('activateBtn').textContent='▶ ACTIVATE ENGINE';
  document.getElementById('activateBtn').classList.remove('live');
  document.getElementById('dot').classList.remove('live');
  document.getElementById('statusTxt').textContent='STOPPED';
}

function processAudio(e) {
  const inp=e.inputBuffer.getChannelData(0);
  const out=e.outputBuffer.getChannelData(0);
  const N=inp.length;

  let peakEnv=0, anomSum=0;

  for(let i=0;i<N;i++) {
    let x=inp[i]*params.inputGain;

    // Envelope
    let env=dsp.env.process(x);
    peakEnv=Math.max(peakEnv,env);

    // Anomaly detection → spike suppression
    let anomRes=dsp.anom.process(env);
    anomSum+=anomRes.score;

    let gain=1.0;
    if(features.smooth) {
      // EMA-driven soft compression
      let smoothEnv=dsp.ema.process(env);
      if(smoothEnv>0.001) gain*=Math.min(1, 0.3/smoothEnv+0.7);
    }

    if(anomRes.isAnomaly && anomRes.dir===1 && features.smooth) {
      gain*=(1 - anomRes.score*params.anomaly*0.5);
    }

    // De-esser: simple high-pass approximation
    if(features.deess) {
      // 1-pole HPF to isolate sibilance energy
      dsp._hp = dsp._hp||0;
      dsp._hp = 0.85*dsp._hp + 0.15*x;
      let hf=x-dsp._hp;
      let hfEnv=Math.abs(hf);
      let hfRes=dsp.hfAnom.process(hfEnv);
      if(hfRes.isAnomaly && hfRes.dir===1) {
        gain*=(1-hfRes.score*params.deEsser*0.6);
        if(hfRes.score>0.85) log('◈ DE-ESS: sibilance suppressed','ess');
      }
    }

    // Smooth gain (avoid zipper)
    dsp.gainSmooth=0.98*dsp.gainSmooth+0.02*gain;

    let wet=x*dsp.gainSmooth;
    let mixed=wet*params.mix + x*(1-params.mix);
    out[i]=mixed*params.outputGain;
  }

  // Pitch (once per block on first sample for perf)
  if(features.pitch) {
    meters.pitchHz=dsp.pitch.process(inp[0]);
  }

  meters.inDb   = 20*Math.log10(Math.max(peakEnv,1e-7));
  meters.anom   = anomSum/N;

  // Log notable events
  if(meters.anom>0.7) log('⚡ SPIKE DETECTED · anomaly='+Math.round(meters.anom*100)+'%','spike');
  if(features.pitch && meters.pitchHz>60) log('♪ PITCH · '+Math.round(meters.pitchHz)+' Hz','pitch');

  updateMeters();
}

// ================================================================
// UI UPDATE
// ================================================================
let lastLog=0;
function log(msg, type='') {
  let now=Date.now();
  if(now-lastLog<300&&type!=='pitch') return; // throttle
  lastLog=now;
  const el=document.getElementById('anomLog');
  const d=document.createElement('div');
  d.className='log-entry '+(type||'');
  d.textContent='['+new Date().toTimeString().slice(0,8)+'] '+msg;
  el.appendChild(d);
  if(el.children.length>40) el.removeChild(el.firstChild);
  el.scrollTop=el.scrollHeight;
}

let meterFrame=0;
function updateMeters() {
  if(++meterFrame%3!==0) return; // ~every 3 blocks

  let inPct=Math.max(0,Math.min(100,(meters.inDb+60)/60*100));
  let anomPct=Math.min(100,meters.anom*100);
  let pitchPct=features.pitch?Math.min(100,(meters.pitchHz-60)/740*100):0;

  document.getElementById('bIn').style.width=inPct+'%';
  document.getElementById('bAnom').style.width=anomPct+'%';
  document.getElementById('bPitch').style.width=pitchPct+'%';

  let inTxt=meters.inDb>-60?meters.inDb.toFixed(1)+' dB':'-∞';
  document.getElementById('mIn').textContent=inTxt;
  document.getElementById('mIn').className='meter-value'+(meters.inDb>-6?' warn':'')+(meters.inDb>-1?' alert':'');

  document.getElementById('mAnom').textContent=Math.round(anomPct)+'%';
  document.getElementById('mAnom').className='meter-value'+(anomPct>70?' warn':'')+(anomPct>85?' alert':'');

  document.getElementById('mPitch').textContent=
    (features.pitch&&meters.pitchHz>60)?Math.round(meters.pitchHz)+' Hz':'-- Hz';
}

// ================================================================
// WAVEFORM VISUALISER
// ================================================================
const canvas=document.getElementById('vizCanvas');
const ctx2=canvas.getContext('2d');
let vizRaf;

function drawViz() {
  if(!isRunning){cancelAnimationFrame(vizRaf);return;}
  vizRaf=requestAnimationFrame(drawViz);

  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  const W=canvas.width, H=canvas.height;

  ctx2.clearRect(0,0,W,H);
  ctx2.fillStyle='#0a1a26';
  ctx2.fillRect(0,0,W,H);

  if(!analyser){return;}
  const data=new Float32Array(analyser.frequencyBinCount);
  analyser.getFloatTimeDomainData(data);

  // Waveform
  ctx2.beginPath();
  ctx2.strokeStyle='#00d4ff';
  ctx2.lineWidth=1.5;
  ctx2.shadowColor='#00d4ff';
  ctx2.shadowBlur=6;

  let step=Math.ceil(data.length/W);
  for(let x=0;x<W;x++) {
    let v=data[x*step]||0;
    let y=H/2+(v*H*0.45);
    x===0?ctx2.moveTo(x,y):ctx2.lineTo(x,y);
  }
  ctx2.stroke();

  // Anomaly overlay
  if(meters.anom>0.5) {
    let alpha=(meters.anom-0.5)*0.3;
    ctx2.fillStyle=`rgba(255,107,53,${alpha})`;
    ctx2.fillRect(0,0,W,H);
  }
}

// ================================================================
// FEATURE TOGGLES
// ================================================================
function toggleFeature(f) {
  features[f]=!features[f];
  const id={smooth:'togSmooth',deess:'togDeess',pitch:'togPitch'}[f];
  document.getElementById(id).classList.toggle('on',features[f]);
  log((features[f]?'▶ ON':'⏸ OFF')+': '+f.toUpperCase());
  if(f==='pitch'&&!features.pitch) { meters.pitchHz=0; updateMeters(); }
}
